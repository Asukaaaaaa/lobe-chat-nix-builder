name: Auto-sync upstream

on:
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小时检查一次
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.event.repository.fork

    steps:
      # 1. 拉取自己 fork
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}   # 需要有 workflow 权限
          fetch-depth: 0

      # 2. 同步上游 main → 自己 main
      - name: Fork sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        id: sync
        with:
          upstream_sync_repo: lobehub/lobe-chat
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.PAT }}
          test_mode: false

      # 3. 失败时创建提醒 issue
      - name: Notify on fail
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Upstream sync failed',
              body: 'Auto-sync job failed; please check manually.',
              labels: ['sync-fail']
            })
